<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EG Security | Secure Portal</title>
    <!-- استدعاء سكربت Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; }
        input[type="text"], input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #007bff; color: white; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        .cf-turnstile { margin-bottom: 20px; display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>نموذج التواصل الآمن</h2>
    <form id="secureForm" action="https://formspree.io/f/mkoezyzk" method="POST">
        
        <div class="form-group">
            <label>الاسم الكامل:</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" name="email" required>
        </div>

        <!-- أداة الحماية Turnstile -->
        <div class="cf-turnstile" 
             data-sitekey="0x4AAAAAADVSGnUiBiBRD5OW" 
             data-callback="enableSubmitButton">
        </div>

        <button type="submit" id="submitBtn" disabled>إرسال الطلب</button>
    </form>
</div>

<script>
    // دالة تفعيل زر الإرسال عند نجاح التحقق
    function enableSubmitButton() {
        document.getElementById('submitBtn').disabled = false;
    }
</script>

</body>
</html>
