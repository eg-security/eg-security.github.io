<!-- التكملة المتممة للكود الخاص بك -->

<script>
    // تفعيل التبديل الليلي
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    themeToggleBtn.addEventListener('click', () => {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        themeToggleBtn.querySelector('i').className = (newTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon');
    });

    // منطق بوابة فودافون كاش
    const serviceSelect = document.getElementById('serviceSelect');
    const vcashGateway = document.getElementById('vcashGateway');
    serviceSelect.addEventListener('change', () => {
        vcashGateway.style.display = serviceSelect.value ? 'block' : 'none';
    });

    // تفعيل زر الإرسال بناءً على الموافقة
    const checkbox = document.getElementById('legalAgree');
    const submitBtn = document.getElementById('submitBtn');
    checkbox.addEventListener('change', () => {
        submitBtn.disabled = !checkbox.checked;
    });

    // حماية البريد الإلكتروني من البوتات
    window.addEventListener('DOMContentLoaded', () => {
        document.getElementById('secure-email-link').innerHTML = 
            '<a href="mailto:mostafa.mahmoud.egp@gmail.com">mostafa.mahmoud.egp@gmail.com</a>';
    });
</script>
