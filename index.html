<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- إضافة سياسات الأمان لمنع هجمات XSS و Clickjacking -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com https://challenges.cloudflare.com; script-src 'self' https://challenges.cloudflare.com; style-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com;">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EG Security | Secure Professional Portal</title>
    
    <!-- تحميل الموارد من مصادر موثوقة فقط -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- دمج Cloudflare Turnstile لمنع البوتات -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        /* [تم الاحتفاظ بتنسيقاتك الاحترافية هنا] */
        body { font-family: 'Cairo', sans-serif; transition: background 0.3s; }
        .cf-turnstile { margin: 20px 0; }
    </style>
</head>
<body>

<!-- محتوى الصفحة -->
<form id="secureForm" action="https://formspree.io/f/mkoezyzk" method="POST">
    <!-- حماية إضافية عبر التوكين -->
    <input type="hidden" name="_gotcha" style="display:none">
    
    <div class="contact-form-wrapper">
        <!-- حقولك هنا... -->
        
        <!-- إضافة أداة Cloudflare Turnstile للتحقق من البشر -->
        <div class="cf-turnstile" data-sitekey="YOUR_SITE_KEY_HERE"></div>

        <button type="submit" class="btn-submit-secure" id="submitBtn" disabled>
            تأكيد وإرسال الطلب عبر الخادم الآمن
        </button>
    </div>
</form>

<script>
    // تفعيل الزر فقط بعد موافقة العميل
    const agree = document.getElementById('legalAgree');
    const btn = document.getElementById('submitBtn');
    if(agree) agree.addEventListener('change', () => btn.disabled = !agree.checked);

    // حماية إضافية لمنع التلاعب في النموذج عبر الـ Console
    Object.freeze(document.getElementById('secureForm'));
</script>

</body>
</html>
